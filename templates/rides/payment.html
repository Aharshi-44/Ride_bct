{% extends "base.html" %}
{% block title %}Payment · Quick-Go{% endblock %}
{% block content %}
<div class="max-w-md text-center">
  <div class="card">
    <div class="flex justify-center mb-2">
      <div class="avatar" style="width:4rem;height:4rem;font-size:1.5rem;" aria-hidden="true">₹</div>
    </div>
    <h1 class="page-title">Demo payment</h1>
    <p class="page-subtitle">No real charges — confirms your ride request.</p>
    <div class="card card--flat mt-2 text-left">
      <p class="muted mb-1" style="font-size:0.75rem;text-transform:uppercase;letter-spacing:0.06em;">Amount due</p>
      <p class="mb-2" style="font-size:2rem;font-weight:800;">₹{{ ride.fare }}</p>
      <p class="muted mb-0">{{ ride.pickup_location }} → {{ ride.drop_location }}</p>
    </div>
    <form method="post" class="mt-2">
      {% csrf_token %}
      <button type="submit" class="btn btn--success btn--block btn--lg">Pay ₹{{ ride.fare }} (simulated)</button>
    </form>
  </div>
</div>
{% endblock %}
